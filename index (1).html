<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calc — Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #1c1c1e;
      --surface: #2c2c2e;
      --top: #3a3a3c;
      --text: #f5f5f7;
      --muted: #8e8e93;
      --orange: #ff9f0a;
      --orange-dark: #d4840a;
      --white-btn: #636366;
      --white-btn-dark: #4a4a4d;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #000;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .calculator {
      width: 340px;
      background: var(--bg);
      border-radius: 40px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 40px 80px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.08);
      user-select: none;
    }

    /* DISPLAY */
    .display {
      padding: 2rem 1.5rem 1.25rem;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 0.5rem;
      position: relative;
    }
    .expression {
      font-size: 1rem;
      color: var(--muted);
      min-height: 1.4em;
      word-break: break-all;
      text-align: right;
      transition: opacity 0.2s;
    }
    .result {
      font-size: 3.5rem;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
      word-break: break-all;
      text-align: right;
      transition: font-size 0.1s;
    }
    .result.small { font-size: 2.2rem; }
    .result.xsmall { font-size: 1.6rem; }

    /* HISTORY */
    .history-toggle {
      position: absolute;
      top: 1rem; left: 1.5rem;
      background: none; border: none; color: var(--muted);
      font-size: 0.7rem; font-family: 'JetBrains Mono', monospace;
      cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
      transition: color 0.2s;
    }
    .history-toggle:hover { color: var(--text); }
    .history-panel {
      display: none;
      padding: 0.5rem 1.5rem 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      max-height: 120px;
      overflow-y: auto;
    }
    .history-panel.open { display: block; }
    .history-item {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      cursor: pointer;
      transition: color 0.15s;
    }
    .history-item:hover { color: var(--text); }
    .history-item:last-child { border-bottom: none; }
    .history-answer { color: var(--orange); }
    .no-history { font-size: 0.75rem; color: var(--muted); text-align: center; padding: 0.5rem; }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 0 1rem 1.5rem;
    }

    /* BUTTONS */
    .btn {
      border: none;
      border-radius: 50%;
      width: 72px;
      height: 72px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      font-weight: 400;
      cursor: pointer;
      transition: filter 0.1s, transform 0.08s;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0);
      transition: background 0.1s;
    }
    .btn:active { transform: scale(0.93); }
    .btn:active::after { background: rgba(255,255,255,0.15); }
    .btn.wide { border-radius: 36px; width: 100%; grid-column: span 2; justify-self: stretch; font-size: 1.2rem; }
    .btn-top { background: var(--top); color: var(--text); }
    .btn-op { background: var(--orange); color: #fff; }
    .btn-op:active { background: var(--orange-dark); }
    .btn-op.active-op { background: var(--text); color: var(--orange); }
    .btn-op.active-op:active { background: #d0d0d8; }
    .btn-num { background: var(--surface); color: var(--text); }
    .btn-top:hover { filter: brightness(1.2); }
    .btn-num:hover { filter: brightness(1.3); }
    .btn-op:hover { filter: brightness(1.1); }
  </style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <button class="history-toggle" onclick="toggleHistory()">History</button>
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="history-panel" id="historyPanel">
    <div class="no-history" id="noHistory">No calculations yet.</div>
  </div>
  <div class="grid">
    <button class="btn btn-top" onclick="pressAC()">AC</button>
    <button class="btn btn-top" onclick="toggleSign()">+/−</button>
    <button class="btn btn-top" onclick="percent()">%</button>
    <button class="btn btn-op" id="op-/" onclick="pressOp('/')">÷</button>

    <button class="btn btn-num" onclick="pressNum('7')">7</button>
    <button class="btn btn-num" onclick="pressNum('8')">8</button>
    <button class="btn btn-num" onclick="pressNum('9')">9</button>
    <button class="btn btn-op" id="op-*" onclick="pressOp('*')">×</button>

    <button class="btn btn-num" onclick="pressNum('4')">4</button>
    <button class="btn btn-num" onclick="pressNum('5')">5</button>
    <button class="btn btn-num" onclick="pressNum('6')">6</button>
    <button class="btn btn-op" id="op--" onclick="pressOp('-')">−</button>

    <button class="btn btn-num" onclick="pressNum('1')">1</button>
    <button class="btn btn-num" onclick="pressNum('2')">2</button>
    <button class="btn btn-num" onclick="pressNum('3')">3</button>
    <button class="btn btn-op" id="op-+" onclick="pressOp('+')">+</button>

    <button class="btn btn-num wide" onclick="pressNum('0')">0</button>
    <button class="btn btn-num" onclick="pressDecimal()">.</button>
    <button class="btn btn-op" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let current = '0', previous = '', operator = null, justCalculated = false;
  let history = [];

  const resultEl = document.getElementById('result');
  const expressionEl = document.getElementById('expression');

  function updateDisplay() {
    resultEl.textContent = formatNum(current);
    const len = formatNum(current).length;
    resultEl.className = 'result' + (len > 12 ? ' xsmall' : len > 9 ? ' small' : '');
  }

  function formatNum(n) {
    const num = parseFloat(n);
    if (isNaN(num)) return n;
    if (Math.abs(num) >= 1e15) return num.toExponential(4);
    const parts = n.split('.');
    parts[0] = parseInt(parts[0]).toLocaleString('en-US');
    return parts.join('.');
  }

  function pressNum(n) {
    if (justCalculated) { current = n; justCalculated = false; expressionEl.textContent = ''; }
    else if (current === '0') current = n;
    else if (current.replace('-','').length < 12) current += n;
    clearOpHighlight();
    updateDisplay();
  }

  function pressDecimal() {
    if (justCalculated) { current = '0.'; justCalculated = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function pressOp(op) {
    if (operator && !justCalculated) {
      const result = compute(parseFloat(previous), parseFloat(current), operator);
      previous = String(result);
      current = String(result);
      updateDisplay();
    } else {
      previous = current;
    }
    operator = op;
    justCalculated = false;
    clearOpHighlight();
    document.getElementById(`op-${op}`)?.classList.add('active-op');
    const symbols = { '+':'+', '-':'−', '*':'×', '/':'÷' };
    expressionEl.textContent = `${formatNum(previous)} ${symbols[op]}`;
  }

  function calculate() {
    if (!operator || !previous) return;
    const a = parseFloat(previous), b = parseFloat(current);
    const symbols = { '+':'+', '-':'−', '*':'×', '/':'÷' };
    const expr = `${formatNum(previous)} ${symbols[operator]} ${formatNum(current)}`;
    const result = compute(a, b, operator);
    const resultStr = String(result);
    addHistory(expr, resultStr);
    expressionEl.textContent = expr + ' =';
    current = resultStr; previous = ''; operator = null;
    justCalculated = true;
    clearOpHighlight();
    updateDisplay();
  }

  function compute(a, b, op) {
    if (op === '+') return round(a + b);
    if (op === '-') return round(a - b);
    if (op === '*') return round(a * b);
    if (op === '/') return b === 0 ? 'Error' : round(a / b);
    return b;
  }

  function round(n) {
    return Math.round(n * 1e10) / 1e10;
  }

  function pressAC() {
    current = '0'; previous = ''; operator = null; justCalculated = false;
    expressionEl.textContent = '';
    clearOpHighlight();
    updateDisplay();
  }

  function toggleSign() {
    if (current !== '0') current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  function clearOpHighlight() {
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active-op'));
  }

  function addHistory(expr, result) {
    history.unshift({ expr, result });
    if (history.length > 10) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const panel = document.getElementById('historyPanel');
    const noH = document.getElementById('noHistory');
    if (history.length === 0) { noH.style.display='block'; return; }
    noH.style.display = 'none';
    const items = history.map((h,i) => `
      <div class="history-item" onclick="useHistory(${i})">
        <span>${h.expr}</span>
        <span class="history-answer">= ${h.result}</span>
      </div>
    `).join('');
    panel.innerHTML = items;
  }

  function useHistory(idx) {
    current = history[idx].result;
    justCalculated = true;
    updateDisplay();
  }

  function toggleHistory() {
    document.getElementById('historyPanel').classList.toggle('open');
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') pressNum(e.key);
    else if (e.key === '.') pressDecimal();
    else if (e.key === '+') pressOp('+');
    else if (e.key === '-') pressOp('-');
    else if (e.key === '*') pressOp('*');
    else if (e.key === '/') { e.preventDefault(); pressOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') pressAC();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0,-1);
      else current = '0';
      updateDisplay();
    }
  });

  updateDisplay();
</script>
</body>
</html>
